<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenTwentyFour GitHub Pages Test</title>
  <style>
    :root {
      --bg1: #f3f8ff;
      --bg2: #e7fff5;
      --text: #0f172a;
      --card: #ffffff;
      --accent: #0ea5e9;
      --muted: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 4px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.14);
      color: #0369a1;
      font-weight: 600;
      font-size: 0.92rem;
    }

    code {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 2px 6px;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>OpenTwentyFour GitHub Pages Test</h1>
    <p>This is a test <code>index.html</code> for GitHub Pages.</p>
    <p>If you can see this page online, publishing is working.</p>
    <span class="badge">Build marker: 2026-03-27</span>
  </main>
</body>
</html>
